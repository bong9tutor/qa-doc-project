<svg xmlns="http://www.w3.org/2000/svg" width="760" height="1740" viewBox="0 0 760 1740"
     font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="760" height="1740" rx="12" fill="#f8f9fa"/>

  <!-- Arrow Markers -->
  <defs>
    <marker id="arr-gray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#888888"/>
    </marker>
    <marker id="arr-teal" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#2ba8a0"/>
    </marker>
    <marker id="arr-amber" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#ffba50"/>
    </marker>
    <marker id="arr-purple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#9b7fc4"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#22c55e"/>
    </marker>
  </defs>

  <!-- ===== TITLE ===== -->
  <rect x="32" y="32" width="4" height="40" rx="2" fill="#ffba50"/>
  <text x="48" y="60" font-size="26" font-weight="bold" fill="#231f20">QA 수행 플로우</text>


  <!-- ===== STEP 1: 프로젝트 분석 ===== -->
  <rect x="180" y="96" width="400" height="140" rx="12" fill="#ffffff" stroke="#2ba8a0" stroke-width="2.5"/>
  <rect x="496" y="104" width="76" height="24" rx="4" fill="#d4f5f3" stroke="#2ba8a0" stroke-width="1"/>
  <text x="534" y="120" font-size="12" font-weight="bold" fill="#1a6b66" text-anchor="middle">코드 리딩</text>
  <circle cx="205" cy="124" r="9" fill="#2ba8a0"/>
  <text x="205" y="129" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">1</text>
  <text x="222" y="130" font-size="18" font-weight="bold" fill="#231f20">프로젝트 분석</text>
  <text x="205" y="155" font-size="13" fill="#666666">- 제공된 프로젝트 파일 전체 구조 파악</text>
  <text x="205" y="173" font-size="13" fill="#666666">- Blueprint / C++ 코드 리딩</text>
  <text x="205" y="191" font-size="13" fill="#666666">- 주요 모듈·의존성 정리 및 기능 목록화</text>
  <rect x="205" y="203" width="355" height="24" rx="8" fill="#f1f3f5"/>
  <text x="221" y="219" font-family="monospace" font-size="12" fill="#231f20">결과물 : 기능 목록 &amp; 의존성 맵</text>

  <!-- Arrow 1 → 2 -->
  <line x1="380" y1="236" x2="380" y2="268" stroke="#2ba8a0" stroke-width="2" marker-end="url(#arr-teal)"/>

  <!-- ===== STEP 2: LLM → QA 체크리스트 생성 ===== -->
  <rect x="180" y="268" width="400" height="140" rx="12" fill="#ffffff" stroke="#2ba8a0" stroke-width="2.5"/>
  <rect x="508" y="276" width="64" height="24" rx="4" fill="#d4f5f3" stroke="#2ba8a0" stroke-width="1"/>
  <text x="540" y="292" font-size="12" font-weight="bold" fill="#1a6b66" text-anchor="middle">AI 활용</text>
  <circle cx="205" cy="296" r="9" fill="#2ba8a0"/>
  <text x="205" y="301" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">2</text>
  <text x="222" y="302" font-size="18" font-weight="bold" fill="#231f20">LLM → QA 체크리스트 생성</text>
  <text x="205" y="327" font-size="13" fill="#666666">- 튜터 배포 플로우차트를 LLM에 입력</text>
  <text x="205" y="345" font-size="13" fill="#666666">- 테스트 시나리오 자동 생성 요청</text>
  <text x="205" y="363" font-size="13" fill="#666666">- 생성된 체크리스트 초안 확보</text>
  <rect x="205" y="375" width="355" height="24" rx="8" fill="#f1f3f5"/>
  <text x="221" y="391" font-family="monospace" font-size="12" fill="#231f20">결과물 : QA 체크리스트 초안</text>

  <!-- Arrow 2 → 3 -->
  <line x1="380" y1="408" x2="380" y2="440" stroke="#2ba8a0" stroke-width="2" marker-end="url(#arr-teal)"/>

  <!-- ===== STEP 3: 체크리스트 검토·보완 ===== -->
  <rect x="180" y="440" width="400" height="140" rx="12" fill="#ffffff" stroke="#2ba8a0" stroke-width="2.5"/>
  <rect x="492" y="448" width="80" height="24" rx="4" fill="#d4f5f3" stroke="#2ba8a0" stroke-width="1"/>
  <text x="532" y="464" font-size="12" font-weight="bold" fill="#1a6b66" text-anchor="middle">UE 특화</text>
  <circle cx="205" cy="468" r="9" fill="#2ba8a0"/>
  <text x="205" y="473" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">3</text>
  <text x="222" y="474" font-size="18" font-weight="bold" fill="#231f20">체크리스트 검토·보완</text>
  <text x="205" y="499" font-size="13" fill="#666666">- Unreal Engine 특유 이슈 항목 수동 추가</text>
  <text x="205" y="517" font-size="13" fill="#666666">- GC, 충돌, 네트워크 동기화 등 검토</text>
  <text x="205" y="535" font-size="13" fill="#666666">- 엣지 케이스 시나리오 보완</text>
  <rect x="205" y="547" width="355" height="24" rx="8" fill="#f1f3f5"/>
  <text x="221" y="563" font-family="monospace" font-size="12" fill="#231f20">결과물 : 최종 QA 체크리스트</text>

  <!-- Arrow 3 → 4 (phase transition) -->
  <line x1="380" y1="580" x2="380" y2="612" stroke="#888888" stroke-width="2" marker-end="url(#arr-gray)"/>

  <!-- ===== STEP 4: 플레이테스트 → 버그 발견 ===== -->
  <rect x="180" y="612" width="400" height="140" rx="12" fill="#ffffff" stroke="#ffba50" stroke-width="2.5"/>
  <rect x="484" y="620" width="88" height="24" rx="4" fill="#fff3d6" stroke="#ffba50" stroke-width="1"/>
  <text x="528" y="636" font-size="12" font-weight="bold" fill="#7a5200" text-anchor="middle">실전 테스트</text>
  <circle cx="205" cy="640" r="9" fill="#ffba50"/>
  <text x="205" y="645" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">4</text>
  <text x="222" y="646" font-size="18" font-weight="bold" fill="#231f20">플레이테스트 → 버그 발견</text>
  <text x="205" y="671" font-size="13" fill="#666666">- 체크리스트 기반 테스트 케이스 순차 실행</text>
  <text x="205" y="689" font-size="13" fill="#666666">- 재현 조건 기록 (입력, 환경, 빈도)</text>
  <text x="205" y="707" font-size="13" fill="#666666">- 스크린샷·영상 캡처로 증거 수집</text>
  <rect x="205" y="719" width="355" height="24" rx="8" fill="#f1f3f5"/>
  <text x="221" y="735" font-family="monospace" font-size="12" fill="#231f20">결과물 : 재현 조건 + 증거 파일</text>

  <!-- Arrow 4 → 5 -->
  <line x1="380" y1="752" x2="380" y2="784" stroke="#ffba50" stroke-width="2" marker-end="url(#arr-amber)"/>

  <!-- ===== STEP 5: 버그 리포트 작성 ===== -->
  <rect x="180" y="784" width="400" height="140" rx="12" fill="#ffffff" stroke="#ffba50" stroke-width="2.5"/>
  <rect x="504" y="792" width="68" height="24" rx="4" fill="#fff3d6" stroke="#ffba50" stroke-width="1"/>
  <text x="538" y="808" font-size="12" font-weight="bold" fill="#7a5200" text-anchor="middle">문서화</text>
  <circle cx="205" cy="812" r="9" fill="#ffba50"/>
  <text x="205" y="817" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">5</text>
  <text x="222" y="818" font-size="18" font-weight="bold" fill="#231f20">버그 리포트 작성</text>
  <text x="205" y="843" font-size="13" fill="#666666">- 제목 / 심각도 / 재현 단계 / 기대·실제 결과</text>
  <text x="205" y="861" font-size="13" fill="#666666">- 첨부 파일(스크린샷·영상) 연결</text>
  <text x="205" y="879" font-size="13" fill="#666666">- 발생 환경(OS, 엔진 버전) 명시</text>
  <rect x="205" y="891" width="355" height="24" rx="8" fill="#f1f3f5"/>
  <text x="221" y="907" font-family="monospace" font-size="12" fill="#231f20">결과물 : 버그 리포트 문서</text>

  <!-- Arrow 5 → 6 -->
  <line x1="380" y1="924" x2="380" y2="956" stroke="#ffba50" stroke-width="2" marker-end="url(#arr-amber)"/>

  <!-- ===== STEP 6: 우선순위 판단 + 사유 작성 ===== -->
  <rect x="180" y="956" width="400" height="140" rx="12" fill="#ffffff" stroke="#ffba50" stroke-width="2.5"/>
  <rect x="488" y="964" width="84" height="24" rx="4" fill="#fff3d6" stroke="#ffba50" stroke-width="1"/>
  <text x="530" y="980" font-size="12" font-weight="bold" fill="#7a5200" text-anchor="middle">Severity</text>
  <circle cx="205" cy="984" r="9" fill="#ffba50"/>
  <text x="205" y="989" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">6</text>
  <text x="222" y="990" font-size="18" font-weight="bold" fill="#231f20">우선순위 판단 + 사유 작성</text>
  <text x="205" y="1015" font-size="13" fill="#666666">- 게임플레이 영향도 기준으로 등급 분류</text>
  <text x="205" y="1033" font-size="13" fill="#666666">- Critical / Major / Minor 분류</text>
  <text x="205" y="1051" font-size="13" fill="#666666">- 수정 난이도 vs 영향도 매트릭스 작성</text>
  <rect x="205" y="1063" width="355" height="24" rx="8" fill="#f1f3f5"/>
  <text x="221" y="1079" font-family="monospace" font-size="12" fill="#231f20">결과물 : 우선순위 매트릭스</text>

  <!-- Arrow 6 → 7 (phase transition) -->
  <line x1="380" y1="1096" x2="380" y2="1128" stroke="#888888" stroke-width="2" marker-end="url(#arr-gray)"/>

  <!-- ===== STEP 7: 디버깅 및 수정 ===== -->
  <rect x="180" y="1128" width="400" height="160" rx="12" fill="#ffffff" stroke="#9b7fc4" stroke-width="2.5"/>
  <rect x="496" y="1136" width="76" height="24" rx="4" fill="#ede7f6" stroke="#9b7fc4" stroke-width="1"/>
  <text x="534" y="1152" font-size="12" font-weight="bold" fill="#4a2d7a" text-anchor="middle">BP + C++</text>
  <circle cx="205" cy="1156" r="9" fill="#9b7fc4"/>
  <text x="205" y="1161" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">7</text>
  <text x="222" y="1162" font-size="18" font-weight="bold" fill="#231f20">디버깅 및 수정 (3개 이상)</text>
  <text x="205" y="1187" font-size="13" fill="#666666">- 우선순위 높은 버그 3개 이상 선정</text>
  <text x="205" y="1205" font-size="13" fill="#666666">- Blueprint로 가능한 것 → BP 수정</text>
  <text x="205" y="1223" font-size="13" fill="#666666">- 로직 문제 → C++ 코드 수정</text>
  <text x="205" y="1241" font-size="13" fill="#666666">- 수정 전·후 코드 diff 기록</text>
  <rect x="205" y="1253" width="355" height="24" rx="8" fill="#f1f3f5"/>
  <text x="221" y="1269" font-family="monospace" font-size="12" fill="#231f20">결과물 : 수정된 BP / C++ 코드</text>

  <!-- Arrow 7 → 8 -->
  <line x1="380" y1="1288" x2="380" y2="1320" stroke="#9b7fc4" stroke-width="2" marker-end="url(#arr-purple)"/>

  <!-- ===== STEP 8: 수정 후 리테스트 ===== -->
  <rect x="180" y="1320" width="400" height="140" rx="12" fill="#ffffff" stroke="#9b7fc4" stroke-width="2.5"/>
  <rect x="488" y="1328" width="84" height="24" rx="4" fill="#ede7f6" stroke="#9b7fc4" stroke-width="1"/>
  <text x="530" y="1344" font-size="12" font-weight="bold" fill="#4a2d7a" text-anchor="middle">리그레션</text>
  <circle cx="205" cy="1348" r="9" fill="#9b7fc4"/>
  <text x="205" y="1353" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">8</text>
  <text x="222" y="1354" font-size="18" font-weight="bold" fill="#231f20">수정 후 리테스트</text>
  <text x="205" y="1379" font-size="13" fill="#666666">- 수정한 버그 재현 여부 확인</text>
  <text x="205" y="1397" font-size="13" fill="#666666">- 연관 기능 리그레션 테스트 실행</text>
  <text x="205" y="1415" font-size="13" fill="#666666">- 새 버그 발생 여부 체크</text>
  <rect x="205" y="1427" width="355" height="24" rx="8" fill="#f1f3f5"/>
  <text x="221" y="1443" font-family="monospace" font-size="12" fill="#231f20">결과물 : 리테스트 결과 보고</text>

  <!-- Arrow 8 → Decision -->
  <line x1="380" y1="1460" x2="380" y2="1492" stroke="#888888" stroke-width="2" marker-end="url(#arr-gray)"/>

  <!-- ===== DECISION: 리테스트 결과 ===== -->
  <rect x="180" y="1492" width="400" height="58" rx="12" fill="#ffffff" stroke="#dddddd" stroke-width="1.5"/>
  <circle cx="202" cy="1511" r="6" fill="#22c55e"/>
  <text x="216" y="1516" font-size="13" fill="#231f20">테스트 통과</text>
  <rect x="432" y="1502" width="60" height="20" rx="4" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="462" y="1516" font-size="11" font-weight="bold" fill="#16a34a" text-anchor="middle">계속 ↓</text>
  <line x1="200" y1="1525" x2="560" y2="1525" stroke="#f1f5f9" stroke-width="1"/>
  <circle cx="202" cy="1539" r="6" fill="#ec4899"/>
  <text x="216" y="1544" font-size="13" fill="#231f20">버그 재발견</text>
  <rect x="398" y="1530" width="92" height="20" rx="4" fill="#fdf2f8" stroke="#fbcfe8" stroke-width="1"/>
  <text x="444" y="1544" font-size="11" font-weight="bold" fill="#db2777" text-anchor="middle">↑ 5번으로</text>

  <!-- Loop arrow: Decision → Step 5 (right side) -->
  <path d="M580,1539 L730,1539 L730,854 L580,854"
        fill="none" stroke="#ffba50" stroke-width="2" stroke-dasharray="8,3"
        marker-end="url(#arr-amber)"/>
  <rect x="676" y="1183" width="90" height="24" rx="4" fill="#ffffff" stroke="#cccccc" stroke-width="1"/>
  <text x="721" y="1199" font-size="11" font-weight="bold" fill="#7a5200" text-anchor="middle">버그 재발견</text>

  <!-- Arrow Decision → Step 9 -->
  <line x1="380" y1="1550" x2="380" y2="1582" stroke="#22c55e" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- ===== STEP 9: 수정 내역서 + 회고록 작성 ===== -->
  <rect x="180" y="1582" width="400" height="140" rx="12" fill="#ffffff" stroke="#22c55e" stroke-width="2.5"/>
  <rect x="492" y="1590" width="80" height="24" rx="4" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="532" y="1606" font-size="12" font-weight="bold" fill="#15803d" text-anchor="middle">최종 제출</text>
  <circle cx="205" cy="1610" r="9" fill="#22c55e"/>
  <text x="205" y="1615" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">9</text>
  <text x="222" y="1616" font-size="18" font-weight="bold" fill="#231f20">수정 내역서 + 회고록 작성</text>
  <text x="205" y="1641" font-size="13" fill="#666666">- 수정한 버그 목록·방법·결과 정리</text>
  <text x="205" y="1659" font-size="13" fill="#666666">- 잘된 점 / 어려웠던 점 / 개선점 회고</text>
  <text x="205" y="1677" font-size="13" fill="#666666">- 다음 스프린트 액션 아이템 도출</text>
  <rect x="205" y="1689" width="355" height="24" rx="8" fill="#f1f3f5"/>
  <text x="221" y="1705" font-family="monospace" font-size="12" fill="#231f20">결과물 : 수정 내역서 + 회고록</text>


</svg>
