<html lang="ko">
<head>
<meta charset="UTF-8">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#f8fafc;color:#374151;font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;}

.nav{background:#fff;border-bottom:1px solid #e5e7eb;padding:12px 16px;position:sticky;top:0;z-index:20;}
.nav-top{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.nav-logo{font-size:14px;font-weight:700;color:#2563eb;}
.nav-doc{font-size:12px;color:#6b7280;}
.nav-links{display:flex;gap:6px;overflow-x:auto;white-space:nowrap;padding-bottom:2px;}
.nav-links::-webkit-scrollbar{height:0;}
.nav-link{font-size:11px;padding:4px 10px;border-radius:20px;background:#f1f5f9;color:#6b7280;text-decoration:none;transition:.2s;}
.nav-link:hover,.nav-link.active{background:#dbeafe;color:#2563eb;}

.page{max-width:680px;margin:0 auto;padding:20px 16px 48px;}
.page-title{font-size:20px;font-weight:700;color:#111827;margin-bottom:4px;}
.page-sub{font-size:13px;color:#6b7280;margin-bottom:20px;}

/* Tabs */
.tabs{display:flex;gap:6px;margin-bottom:16px;background:#f1f5f9;padding:4px;border-radius:24px;width:fit-content;}
.tab{font-size:12px;padding:6px 18px;border-radius:20px;border:none;cursor:pointer;
  background:transparent;color:#6b7280;transition:.2s;font-family:inherit;}
.tab.active{background:#fff;color:#7c3aed;box-shadow:0 1px 3px rgba(0,0,0,.1);}

.tab-pane{display:none;}
.tab-pane.active{display:block;}

/* State Grid */
.state-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:16px;}
.state-node{background:#fff;border:1.5px solid #e5e7eb;border-radius:8px;padding:10px 12px;
  cursor:pointer;transition:.2s;opacity:0;transform:translateY(6px);}
.state-node.visible{opacity:1;transform:translateY(0);}
.state-node:hover{box-shadow:0 2px 8px rgba(0,0,0,.08);border-color:var(--sc,#7c3aed);}
.state-node.selected{border-color:var(--sc,#7c3aed);background:var(--sbg,#f5f3ff);box-shadow:0 2px 8px rgba(0,0,0,.08);}
.state-node-dot{width:8px;height:8px;border-radius:50%;margin-bottom:6px;}
.state-node-name{font-size:12px;font-weight:700;color:#111827;margin-bottom:2px;}
.state-node-tag{font-size:10px;color:#6b7280;}

/* Detail Panel */
.detail-panel{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:16px;
  min-height:120px;transition:.2s;}
.detail-empty{color:#9ca3af;font-size:13px;text-align:center;padding:24px 0;}
.detail-title{font-size:15px;font-weight:700;color:#111827;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.detail-dot{width:10px;height:10px;border-radius:50%;}

.lifecycle-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.lc-box{border-radius:6px;padding:10px;background:#fafafa;border:1px solid #f3f4f6;}
.lc-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#6b7280;margin-bottom:4px;}
.lc-code{font-family:'JetBrains Mono',monospace;font-size:11px;color:#374151;line-height:1.5;}

.trans-list{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
.trans-tag{font-size:11px;padding:3px 9px;border-radius:20px;background:#fafafa;border:1px solid #e5e7eb;color:#374151;}

/* Simulation */
.sim-controls{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.sim-btn{font-size:12px;padding:6px 14px;border-radius:20px;border:none;cursor:pointer;
  font-family:inherit;transition:.2s;}
.sim-start{background:#7c3aed;color:#fff;}
.sim-start:hover{background:#6d28d9;}
.sim-reset{background:#f1f5f9;color:#6b7280;}
.sim-state-label{font-size:12px;color:#6b7280;margin-left:4px;}
.sim-state-val{font-size:12px;font-weight:700;color:#7c3aed;}

.sim-timeline{position:relative;padding-left:18px;margin-top:12px;}
.sim-timeline::before{content:'';position:absolute;left:7px;top:0;bottom:0;width:2px;background:#e5e7eb;}
.sim-step{position:relative;margin-bottom:10px;display:flex;align-items:flex-start;gap:10px;}
.sim-step-dot{width:14px;height:14px;border-radius:50%;border:2px solid #e5e7eb;background:#fff;
  flex-shrink:0;margin-top:2px;transition:.3s;}
.sim-step-dot.done{border-color:#7c3aed;background:#7c3aed;}
.sim-step-dot.current{border-color:#7c3aed;background:#fff;box-shadow:0 0 0 3px rgba(124,58,237,.15);}
.sim-step-text{font-size:12px;color:#9ca3af;line-height:1.5;transition:.3s;}
.sim-step-text.done{color:#374151;}
.sim-step-text.current{color:#7c3aed;font-weight:600;}

pre{font-family:'JetBrains Mono',monospace;font-size:12px;background:#f1f5f9;
  border:1px solid #e5e7eb;border-radius:6px;padding:10px 12px;margin-top:8px;
  overflow-x:auto;line-height:1.6;color:#374151;}
.kw{color:#7c3aed;font-weight:600;}
.fn{color:#2563eb;}
.cm{color:#9ca3af;}

.fade{opacity:0;transform:translateY(8px);transition:.35s ease;}
.fade.visible{opacity:1;transform:translateY(0);}
</style>
</head>

let simInterval, simStep = 0;

function buildGrid(states, gridId, detailId) {
  const grid = document.getElementById(gridId);
  states.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = 'state-node';
    el.style.setProperty('--sc', s.color);
    el.style.setProperty('--sbg', s.bg);
    el.innerHTML = `<div class="state-node-dot" style="background:${s.color}"></div>
      <div class="state-node-name">${s.name}</div>
      <div class="state-node-tag">${s.tag}</div>`;
    el.onclick = () => showDetail(states, i, gridId, detailId);
    setTimeout(() => el.classList.add('visible'), 100 + i * 40);
    grid.appendChild(el);
  });
}

function showDetail(states, idx, gridId, detailId) {
  const s = states[idx];
  document.querySelectorAll(`#${gridId} .state-node`).forEach(n => n.classList.remove('selected'));
  document.querySelectorAll(`#${gridId} .state-node`)[idx].classList.add('selected');
  const panel = document.getElementById(detailId);
  panel.innerHTML = `
    <div class="detail-title">
      <div class="detail-dot" style="background:${s.color}"></div>
      ${s.name} <span style="font-size:12px;color:${s.color};font-weight:500">${s.tag}</span>
    </div>
    <div class="lifecycle-row">
      <div class="lc-box"><div class="lc-label" style="color:#16a34a">Enter</div><div class="lc-code">${s.enter}</div></div>
      <div class="lc-box"><div class="lc-label" style="color:#d97706">Tick</div><div class="lc-code">${s.tick}</div></div>
      <div class="lc-box"><div class="lc-label" style="color:#ef4444">Exit</div><div class="lc-code">${s.exit}</div></div>
    </div>
    <div style="font-size:12px;font-weight:600;color:#6b7280;margin-bottom:6px">가능한 전환</div>
    <div class="trans-list">${s.transitions.map(t=>`<span class="trans-tag">→ ${t}</span>`).join('')}</div>
    <pre>${s.code}</pre>`;
}

function buildSimTimeline() {
  const tl = document.getElementById('simTimeline');
  tl.innerHTML = simSteps.map((s,i) => `
    <div class="sim-step" id="simStep${i}">
      <div class="sim-step-dot" id="simDot${i}"></div>
      <div class="sim-step-text" id="simText${i}"><strong>${s.state}</strong> — ${s.desc}</div>
    </div>`).join('');
}

function runSim() {
  resetSim();
  buildSimTimeline();
  simStep = 0;
  simInterval = setInterval(() => {
    if (simStep > 0) {
      document.getElementById(`simDot${simStep-1}`)?.classList.replace('current','done');
      document.getElementById(`simText${simStep-1}`)?.classList.replace('current','done');
    }
    if (simStep >= simSteps.length) { clearInterval(simInterval); return; }
    document.getElementById(`simDot${simStep}`)?.classList.add('current');
    document.getElementById(`simText${simStep}`)?.classList.add('current');
    document.getElementById('simCurrent').textContent = simSteps[simStep].state;
    simStep++;
  }, 900);
}

function resetSim() {
  clearInterval(simInterval);
  simStep = 0;
  document.getElementById('simCurrent').textContent = 'Idle';
  buildSimTimeline();
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
}

// Init
buildGrid(playerStates, 'playerGrid', 'playerDetail');
buildGrid(gameStates, 'gameGrid', 'gameDetail');
buildSimTimeline();

['pt','ps','tb'].forEach((id,i)=>
  setTimeout(()=>document.getElementById(id)?.classList.add('visible'),i*80));
</script>
</body>
