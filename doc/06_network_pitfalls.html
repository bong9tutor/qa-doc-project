.fn{color:#2563eb;}
.cm{color:#9ca3af;}
.err{color:#ef4444;font-weight:600;}

.info-box.tip{background:#eff6ff;border-left:3px solid #2563eb;color:#1d4ed8;}
.info-box.warn{background:#fffbeb;border-left:3px solid #d97706;color:#92400e;}
.info-box.danger{background:#fef2f2;border-left:3px solid #ef4444;color:#991b1b;}

.compare{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;}
.compare-col{border-radius:6px;padding:10px;font-size:12px;line-height:1.6;}
.compare-bad{background:#fef2f2;border:1px solid #fecaca;}
.compare-good{background:#f0fdf4;border:1px solid #bbf7d0;}
.compare-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}

.desc{font-size:12px;color:#4b5563;margin-top:8px;line-height:1.7;}
.desc strong{color:#111827;}

/* QA Checklist Table */
.qa-table{width:100%;border-collapse:collapse;margin-top:12px;font-size:12px;}
.qa-table th{background:#1e293b;color:#fff;padding:8px 10px;text-align:left;font-weight:600;font-size:11px;}
.qa-table td{padding:8px 10px;border-bottom:1px solid #e5e7eb;}
.qa-table tr:hover td{background:#f8fafc;}
.qa-table .check-num{width:32px;text-align:center;font-weight:700;color:#6b7280;}
.qa-table .check-cat{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;white-space:nowrap;}

.fade{opacity:0;transform:translateY(8px);transition:.35s ease;}
.fade.visible{opacity:1;transform:translateY(0);}

<script>
const secColors = {
  rpc:'#ef4444', replication:'#d97706', authority:'#7c3aed',
  multicast:'#0891b2', travel:'#ea580c', checklist:'#16a34a'
};

const sections = {
  rpc: [
    { icon:'1', title:'UFUNCTION(Server, Reliable) 매크로 누락',
      severity:'P0 Critical', sevColor:'#ef4444', sevBg:'#fef2f2', sevBorder:'#fecaca',
      desc:`함수 선언에 <strong>UFUNCTION(Server, Reliable)</strong> 매크로가 없으면 일반 함수 호출이 되어 클라이언트에서 로컬 실행됩니다. 서버에 절대 도달하지 않습니다.`,
      compare: {
        bad: `<div class="compare-label" style="color:#ef4444">BUG: 매크로 누락</div><pre><span class="cm">// 매크로 없음 - 로컬에서만 실행됨</span>
<span class="kw">void</span> <span class="fn">ServerRPC_RequestSpectate</span>();

<span class="cm">// .cpp에서 _Implementation도 없음</span>
<span class="kw">void</span> UAO_DeathSpectateComponent::<span class="err">ServerRPC_RequestSpectate</span>()
{
    <span class="cm">// 서버에서 실행되어야 하는 코드...</span>
}</pre>`,
        good: `<div class="compare-label" style="color:#16a34a">CORRECT: 프로젝트 실제 코드</div><pre><span class="cm">// AO_DeathSpectateComponent.h</span>
<span class="kw">UFUNCTION</span>(Server, Reliable)
<span class="kw">void</span> <span class="fn">ServerRPC_RequestSpectate</span>();

<span class="cm">// .cpp - _Implementation 접미사 필수</span>
<span class="kw">void</span> UAO_DeathSpectateComponent
    ::<span class="ok">ServerRPC_RequestSpectate_Implementation</span>()
{
    <span class="cm">// 서버에서 실행</span>
}</pre>`
      },
      note:'CLAUDE.md에서 이 패턴을 "흔한 버그 위치"로 명시하고 있습니다. 코드 리뷰 시 모든 Server_*, ServerRPC_* 함수에 UFUNCTION 매크로가 있는지 확인하세요.'
    },
    { icon:'2', title:'_Implementation 접미사 누락 → 링크 에러',
      severity:'P0 Critical', sevColor:'#ef4444', sevBg:'#fef2f2', sevBorder:'#fecaca',
      desc:`UE5 네트워크 RPC는 헤더에 선언한 함수명에 자동으로 <strong>_Implementation</strong> 접미사가 붙은 함수를 찾습니다. .cpp에서 이를 빠뜨리면 <strong>링크 에러</strong>가 발생하거나, 컴파일은 되지만 실행 시 아무 동작도 하지 않습니다.`,
      compare: {
        bad: `<div class="compare-label" style="color:#ef4444">BUG: _Implementation 누락</div><pre><span class="cm">// .h 선언</span>
<span class="kw">UFUNCTION</span>(Server, Reliable)
<span class="kw">void</span> <span class="fn">Server_RequestRevive</span>();

<span class="cm">// .cpp - 접미사 없음!</span>
<span class="kw">void</span> AAO_PlayerController_Stage
    ::<span class="err">Server_RequestRevive</span>()
{
    <span class="cm">// 링크 에러 또는 미실행</span>
}</pre>`,
        good: `<div class="compare-label" style="color:#16a34a">CORRECT: _Implementation 포함</div><pre><span class="cm">// .h 선언</span>
<span class="kw">UFUNCTION</span>(Server, Reliable)
<span class="kw">void</span> <span class="fn">Server_RequestRevive</span>();

<span class="cm">// .cpp - 올바른 접미사</span>
<span class="kw">void</span> AAO_PlayerController_Stage
    ::<span class="ok">Server_RequestRevive_Implementation</span>()
{
    <span class="cm">// 정상 동작</span>
}</pre>`
      }
    },
    { icon:'3', title:'Server ↔ Client RPC 타입 혼동',
      severity:'P1 High', sevColor:'#f59e0b', sevBg:'#fffbeb', sevBorder:'#fef3c7',
      desc:`Server RPC는 <strong>클라이언트 → 서버</strong> 방향이고, Client RPC는 <strong>서버 → 특정 클라이언트</strong> 방향입니다. 방향을 혼동하면 함수가 전혀 실행되지 않거나 잘못된 머신에서 실행됩니다.`,
      compare: {
        bad: `<div class="compare-label" style="color:#ef4444">BUG: 방향 혼동</div><pre><span class="cm">// 서버에서 클라이언트로 보내야 하는데
// Server RPC로 선언 → 서버에서 호출 불가</span>
<span class="kw">UFUNCTION</span>(<span class="err">Server</span>, Reliable)
<span class="kw">void</span> <span class="fn">NotifyClientRevived</span>();

<span class="cm">// 서버 GameMode에서 호출 시도
// → 서버에서 Server RPC 호출 = 무의미</span></pre>`,
        good: `<div class="compare-label" style="color:#16a34a">CORRECT: 실제 프로젝트 패턴</div><pre><span class="cm">// AO_PlayerController_Stage.h
// 서버 → 클라이언트 방향</span>
<span class="kw">UFUNCTION</span>(<span class="ok">Client</span>, Reliable)
<span class="kw">void</span> <span class="fn">Client_OnRevived</span>();

<span class="cm">// 클라이언트 → 서버 방향</span>
<span class="kw">UFUNCTION</span>(<span class="ok">Server</span>, Reliable)
<span class="kw">void</span> <span class="fn">Server_RequestRevive</span>();</pre>`
      },
      note:'프로젝트 네이밍 컨벤션: Server_*, ServerRPC_* = Server RPC / Client_*, ClientRPC_* = Client RPC. 접두사와 UFUNCTION 지정자가 일치하는지 확인하세요.'
    },
    { icon:'4', title:'RPC 함수의 Owner 제약 무시',
      severity:'P1 High', sevColor:'#f59e0b', sevBg:'#fffbeb', sevBorder:'#fef3c7',
      desc:`Server RPC와 Client RPC는 <strong>해당 액터의 Owner (Connection) 체인</strong>에서만 호출 가능합니다. Owner가 아닌 클라이언트에서 Server RPC를 호출하면 무시됩니다. AVaOut에서 <code>AO_InteractionComponent</code>처럼 컴포넌트에 RPC가 있는 경우, 컴포넌트의 Owner 체인이 올바른지 확인해야 합니다.`,
      compare: {
        bad: `<div class="compare-label" style="color:#ef4444">BUG: Owner 없는 액터에서 RPC 호출</div><pre><span class="cm">// Owner가 설정되지 않은 월드 액터에서
// Server RPC 호출 → 무시됨</span>
<span class="kw">UFUNCTION</span>(Server, Reliable)
<span class="kw">void</span> <span class="fn">ServerDoAction</span>();
<span class="cm">// 이 액터는 누구의 Connection도 아님</span></pre>`,
        good: `<div class="compare-label" style="color:#16a34a">CORRECT: PlayerController 소유 체인</div><pre><span class="cm">// AO_InteractionComponent는
// PlayerCharacter에 부착 → PC가 Owner
// → Connection 체인 유효</span>
<span class="kw">UFUNCTION</span>(Server, Reliable)
<span class="kw">void</span> <span class="fn">ServerTriggerInteract</span>(AActor* Target);
<span class="cm">// Owner: Character → PC → Connection</span></pre>`
      }
    }
  ],

  replication: [
    { icon:'1', title:'GetLifetimeReplicatedProps() 오버라이드 누락',
      severity:'P0 Critical', sevColor:'#ef4444', sevBg:'#fef2f2', sevBorder:'#fecaca',
      desc:`<strong>UPROPERTY(Replicated)</strong> 또는 <strong>ReplicatedUsing</strong>을 선언해도, <code>GetLifetimeReplicatedProps()</code>에서 <code>DOREPLIFETIME</code>을 등록하지 않으면 값이 복제되지 않습니다. 프로퍼티가 존재하지만 클라이언트에서 항상 기본값인 경우 이 패턴을 의심하세요.`,
      compare: {
        bad: `<div class="compare-label" style="color:#ef4444">BUG: DOREPLIFETIME 누락</div><pre><span class="cm">// .h - 선언은 되어 있지만...</span>
<span class="kw">UPROPERTY</span>(Replicated)
bool bNewFeature;

<span class="cm">// .cpp - GetLifetimeReplicatedProps에
// DOREPLIFETIME 등록 안 함
// → 클라이언트에서 항상 false</span></pre>`,
        good: `<div class="compare-label" style="color:#16a34a">CORRECT: 프로젝트 실제 패턴</div><pre><span class="cm">// AO_GameState.h</span>
<span class="kw">UPROPERTY</span>(Replicated)
bool bHint1;

<span class="cm">// AO_GameState.cpp</span>
<span class="kw">void</span> AAO_GameState::<span class="fn">GetLifetimeReplicatedProps</span>(...) {
    Super::GetLifetimeReplicatedProps(...);
    <span class="ok">DOREPLIFETIME</span>(AAO_GameState, bHint1);
}</pre>`
      }
    },
    { icon:'2', title:'OnRep 콜백이 잘못된 변수에 매핑됨',
      severity:'P1 High', sevColor:'#f59e0b', sevBg:'#fffbeb', sevBorder:'#fef3c7',
      desc:`<strong>ReplicatedUsing</strong>에 지정한 OnRep 함수명이 다른 변수의 콜백과 동일하면, 한 변수가 변경될 때 잘못된 로직이 실행됩니다. AVaOut GameState에서 실제로 발견되는 패턴입니다.`,
      compare: {
        bad: `<div class="compare-label" style="color:#ef4444">BUG: 실제 프로젝트 - AO_GameState.h</div><pre><span class="cm">// 모든 변수가 같은 OnRep을 사용!</span>
<span class="kw">UPROPERTY</span>(ReplicatedUsing = <span class="err">OnRep_TeamDeathCount</span>)
int32 TeamDeathCount;

<span class="kw">UPROPERTY</span>(ReplicatedUsing = <span class="err">OnRep_TeamDeathCount</span>)
float GameStartTime;  <span class="cm">// ← 잘못된 OnRep!</span>

<span class="kw">UPROPERTY</span>(ReplicatedUsing = <span class="err">OnRep_TeamDeathCount</span>)
float GameEndTime;    <span class="cm">// ← 잘못된 OnRep!</span></pre>`,
        good: `<div class="compare-label" style="color:#16a34a">SHOULD BE: 각각 고유 OnRep</div><pre><span class="kw">UPROPERTY</span>(ReplicatedUsing = <span class="ok">OnRep_TeamDeathCount</span>)
int32 TeamDeathCount;

<span class="kw">UPROPERTY</span>(ReplicatedUsing = <span class="ok">OnRep_GameStartTime</span>)
float GameStartTime;

<span class="kw">UPROPERTY</span>(ReplicatedUsing = <span class="ok">OnRep_GameEndTime</span>)
float GameEndTime;</pre>`
      },
      note:'이것은 AVaOut에 실제로 존재하는 의도적 버그 후보입니다. GameStartTime이 변경될 때 OnRep_TeamDeathCount가 호출되면 UI가 잘못 갱신됩니다.'
    },
    { icon:'3', title:'DOREPLIFETIME_CONDITION 조건 오용',
      severity:'P2 Medium', sevColor:'#3b82f6', sevBg:'#eff6ff', sevBorder:'#dbeafe',
      desc:`<code>DOREPLIFETIME_CONDITION</code>에 잘못된 조건을 지정하면 특정 클라이언트에서만 값이 복제되거나 아예 복제되지 않습니다. 예: <code>COND_OwnerOnly</code>를 사용했는데 모든 클라이언트에 표시되어야 하는 데이터인 경우.`,
      compare: {
        bad: `<div class="compare-label" style="color:#ef4444">BUG: 잘못된 조건</div><pre><span class="cm">// 모든 클라이언트에 보여야 하는 체력인데
// OwnerOnly로 복제</span>
<span class="err">DOREPLIFETIME_CONDITION</span>(
    UAO_PlayerCharacter_AttributeSet,
    Health, <span class="err">COND_OwnerOnly</span>);
<span class="cm">// 다른 플레이어 체력이 안 보임</span></pre>`,
        good: `<div class="compare-label" style="color:#16a34a">CORRECT: 프로젝트 실제 코드</div><pre><span class="cm">// AO_PlayerCharacter_AttributeSet.cpp
// 모든 클라이언트에 복제</span>
<span class="ok">DOREPLIFETIME_CONDITION_NOTIFY</span>(
    UAO_PlayerCharacter_AttributeSet,
    Health, <span class="ok">COND_None</span>,
    REPNOTIFY_Always);</pre>`
      }
    },
    { icon:'4', title:'Replicated 배열의 구조체 변경 미감지',
      severity:'P2 Medium', sevColor:'#3b82f6', sevBg:'#eff6ff', sevBorder:'#dbeafe',

function buildSection(key) {
  const container = document.getElementById('sec-' + key);
  if (!container || container.children.length > 0) return;

  if (key === 'checklist') {
    buildChecklist(container);
    return;
  }

  const items = sections[key];
  items.forEach((item, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.setProperty('--accent', item.sevColor);

    let bodyContent = '';
    if (item.desc) bodyContent += `<div class="desc">${item.desc}</div>`;
    if (item.compare) {
      bodyContent += `<div class="compare">
        <div class="compare-col compare-bad">${item.compare.bad}</div>
        <div class="compare-col compare-good">${item.compare.good}</div>
      </div>`;
    }
    if (item.note) bodyContent += `<div class="info-box tip">${item.note}</div>`;

    card.innerHTML = `
      <div class="card-head" onclick="toggleCard(this)">
        <div class="card-icon" style="background:${item.sevColor}">${item.icon}</div>
        <div class="card-title">${item.title}</div>
        <div class="card-severity" style="background:${item.sevBg};color:${item.sevColor};border:1px solid ${item.sevBorder}">${item.severity}</div>
        <div class="card-toggle">&#9654;</div>
      </div>
      <div class="card-body">
        <div class="card-body-inner">${bodyContent}</div>
      </div>`;

    setTimeout(() => card.classList.add('visible'), 80 + i * 60);
    container.appendChild(card);
  });
}

function buildChecklist(container) {
  const wrapper = document.createElement('div');
  wrapper.className = 'card visible';
  wrapper.style.cssText = 'opacity:1;transform:none;cursor:default;';

  let rows = '';
  checklistData.forEach(c => {
    rows += `<tr>
      <td class="check-num">${c.num}</td>
      <td><span class="check-cat" style="background:${c.catBg};color:${c.catColor};border:1px solid ${c.catColor}30">${c.cat}</span></td>
      <td>${c.item}</td>
      <td>${c.host}</td>
      <td>${c.guest}</td>
    </tr>`;
  });

  wrapper.innerHTML = `
    <div style="padding:14px;">
      <div style="font-size:14px;font-weight:700;color:#111827;margin-bottom:4px;">멀티플레이 QA 체크리스트</div>
      <div style="font-size:12px;color:#6b7280;margin-bottom:12px;">호스트(서버)와 게스트(클라이언트) 양쪽에서 반드시 확인해야 할 10가지 핵심 항목</div>
      <div style="overflow-x:auto;">
        <table class="qa-table">
          <thead>
            <tr>
              <th style="width:32px">#</th>
              <th style="width:90px">분류</th>
              <th>확인 항목</th>
              <th style="width:140px">호스트 확인</th>
              <th style="width:140px">게스트 확인</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      <div class="info-box warn" style="margin-top:12px;">
        <strong>중요:</strong> 모든 테스트는 최소 2인 이상 접속 상태에서 진행하세요.
        PIE(Play-In-Editor)의 "Number of Players"를 3으로 설정하고,
        Net Mode를 "Play As Listen Server"로 테스트합니다.
        Steam App ID 480(Spacewar)으로 실제 네트워크 테스트도 병행하세요.
      </div>
      <div class="info-box tip" style="margin-top:8px;">
        <strong>동시 액션 테스트 팁:</strong> 같은 아이템 동시 픽업, 같은 퍼즐 동시 조작,
        같은 NPC 동시 상호작용 등을 테스트할 때는 두 클라이언트에서 동시에 E키를 누르세요.
        서버의 bCollected / bIsActivated 같은 플래그가 레이스 컨디션을 방지하는지 확인합니다.
      </div>
    </div>`;

  container.appendChild(wrapper);
}

function toggleCard(head) {
  head.closest('.card').classList.toggle('open');
}

function switchSection(key, btn) {
  document.querySelectorAll('.sec-tab').forEach(t => {
    t.classList.remove('active');
    t.style.background = '#f1f5f9';
    t.style.color = '#6b7280';
  });
  btn.classList.add('active');
  btn.style.background = secColors[key] || '#374151';
  btn.style.color = '#fff';
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('sec-' + key).classList.add('active');
  buildSection(key);
}
